# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Conservative defaults:
#   - one grouped PR per month containing only patch + minor bumps
#   - major-version bumps are ignored entirely (manual upgrades only — they
#     frequently break peer deps and benchmark-suite assumptions on this stack)

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      all-non-major:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # No major-version bumps anywhere — they routinely break peer deps and
      # require manual migration on this stack.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
      # zotero-plugin-toolkit ships breaking API changes inside minor bumps
      # while in 5.1.x beta→stable transition (e.g. ztoolkit.Menu API removal).
      # Re-enable once it stabilises past beta.
      - dependency-name: "zotero-plugin-toolkit"
